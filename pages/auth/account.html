<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Mon Compte</h1>
    </div>
</div>

<div class="container mt-4">
    <form id="form-account">
        <div class="mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Votre nom">
        </div>
        <div class="mb-3">
            <label for="PrenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="PrenomInput" placeholder="Votre prénom">
        </div>
        <div class="mb-3">
            <label for="EmailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="EmailInput" readonly>
        </div>
        <div class="mb-3">
            <label for="AllergieInput" class="form-label">Allergies</label>
            <textarea class="form-control" id="AllergieInput" rows="3" placeholder="Indiquez vos allergies alimentaires..."></textarea>
        </div>

        <div id="message-account" class="mt-3 text-center"></div>


        <div class="text-center">
            <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
        </div>
    </form>
</div>

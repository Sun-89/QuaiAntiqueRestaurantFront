<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Inscription</h1>
    </div>
</div>

<div class="container">
    <form id="formulaireInscription">
        <div class="mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Votre nom" name="nom">
            <div class="invalid-feedback">
                Le nom est requis
            </div>
        </div>
        <div class="mb-3">
            <label for="PrenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="PrenomInput" placeholder="Votre prénom"name="prenom">
            <div class="invalid-feedback">
                Le prenom est requis
            </div>
        </div>
        <div class="mb-3">
            <label for="EmailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="EmailInput" placeholder="Votre email" name="email">
            <div class="invalid-feedback">
                Le mail n'est pas au bon format
            </div>
        </div>

        
        <div class="mb-3">
            <label for="PasswordInput" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="PasswordInput" placeholder="Votre mot de passe" name="mdp">
            <div class="invalid-feedback">
                Le mot de passe n'est pas assez robuste: au moins 8 caractères, comprennant une majuscule, une minuscule, un chiffre et un caractère special
            </div>
            <div class="valid-feedback">
            le mot de passe est robuste
            </div>
        </div>
        <div class="mb-3">
            <label for="ValidatePasswordInput" class="form-label">Validez votre Mot de passe</label>
            <input type="password" class="form-control" id="ValidatePasswordInput" placeholder="Votre mot de passe">
        </div>
        <div class="text-center">
        <button type="button" class="btn btn-primary" id="btn-validation-inscription" disabled>Inscription</button>
        </div>
    </form>
    <div class="text-center pt-3 mb-3">
        <a href="/signin"> Vous avez déjà un compte ? Connectez-vous ici</a>
    </div>
</div>
<script src="/js/signup.js"></script>

<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Annuler ma Réservation</h1>
    </div>
</div>

<div class="container mt-4">
    <p class="text-center">Êtes-vous sûr de vouloir annuler la réservation suivante ?</p>

    <div id="reservation-details" class="card mx-auto shadow-sm" style="max-width: 500px;">
        <div class="card-body text-center">
            <h5 class="card-title mb-3">Détails de la réservation</h5>
            <p class="card-text">
                <strong>Date :</strong> <span id="displayDate">Chargement...</span><br>
                <strong>Heure :</strong> <span id="displayHour">...</span><br>
                <strong>Personnes :</strong> <span id="displayConvives">...</span><br>
                <strong>Allergies :</strong> <span id="displayAllergies">...</span>
            </p>
        </div>
    </div>

    <div class="alert alert-warning text-center mt-3 mx-auto" style="max-width: 500px;">
        ⚠️ Cette action est irréversible.
    </div>

    <div class="text-center mt-4 mb-5">
        <a href="/allResa" class="btn btn-secondary" onclick="route(event)">Retour</a>
        <button id="btn-confirm-annul" class="btn btn-danger">Confirmer l'annulation</button>
    </div>
</div>

<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Galerie</h1>
    </div>
</div>

<div class="container">
    <div class="text-center mt-4">
        <button id="btn-add-photo" type="button" class="btn btn-primary d-none" data-bs-toggle="modal" data-bs-target="#EditionPhotoModal">Ajouter une photo</button>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mt-2" id="allImages">
        </div>
    
    <div class="text-center mt-5">
        <a href="/reserver" class="btn btn-primary" onclick="route(event)">Réserver une table</a>
    </div>
</div>

<div class="modal fade" id="EditionPhotoModal" tabindex="-1" aria-labelledby="EditionPhotoModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title fs-5" id="EditionPhotoModalLabel">Ajouter une photo</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="form-image">
            <div class="mb-3">
                <label for="NameInputPhoto" class="form-label">Titre de la photo</label>
                <input type="text" class="form-control" id="NameInputPhoto" placeholder="Ex: Lasagnes maison" required>
            </div>
            <div class="mb-3">
                <label for="ImageInput" class="form-label">Fichier image</label>
                <input type="file" class="form-control" id="ImageInput" accept="image/*" required>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary" id="btn-valider-photo">Enregistrer</button>
            </div>
        </form>
      </div>
    </div>
  </div>
</div>
